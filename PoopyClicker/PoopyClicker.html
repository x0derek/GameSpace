<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💩PoppyClicker💩</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="Money">0</section>
    <section id="CLicker">
        <button class="Rotate" id="Button">💩</button>
    </section>
    <section id="Upgrade_board">
        <!-- Upgrade 1 -->
        <div>
            <div id="Up1_Cena">Auto Clicker - 1</div>
            <button id="Up1">Buy</button>
        <div>
        <!-- Upgrade 2 -->
        <div>
            <div id="Up2_Cena">Podtarcie - 10</div>
            <button id="Up2">Buy</button>
        <div>
    </section>
</body>
    <script>
        let Money = 0
        let Up1_Price = 1
        let Up2_Price = 10
        let multy = 1
        let Fast = 1
        
        button = document.getElementById("Button").addEventListener("click", function(){
            Money= Money + (1*multy);
            document.getElementById("Money").textContent = Money;
        });
        document.getElementById("Up1").addEventListener("click", function(){
            if(Money >= Up1_Price){
                Money = Money - Up1_Price
                document.getElementById("Money").textContent = Money;
                Up1_Price=Up1_Price*2
                document.getElementById("Up1_Cena").innerText = "Auto Clicker - " + Up1_Price
                auto = true
            }
            else{
                alert("Niestać cię")
            }
        });

        document.getElementById("Up2").addEventListener("click", function(){
            if(Money >= Up2_Price){
                Money = Money - Up2_Price
                document.getElementById("Money").textContent = Money;
                Up2_Price=Up2_Price*2
                multy += 1
                document.getElementById("Up2_Cena").innerText = "Podtarcie - " + Up2_Price
            }
            else{
                alert("Niestać cię")
            }
        });

        while(true){
            if(auto == true){
                setInterval(function(){
                    Money= Money + (1*multy)
                    document.getElementById("Money").textContent = Money;
                }, 1000 / Fast)
            }
        }
    </script>
</html>
