<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>

<style>
body { margin: 0; overflow: hidden; background-color: #111; }

#startScreen {
    position: absolute; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); color: white;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    cursor: pointer;
}

#ui {
    position: absolute; top: 10px; width: 100%;
    text-align: center; color: white;
}
</style>
</head>

<body>

<div id="startScreen">
<h1>Snake</h1>
<p>Kliknij aby zacząć</p>
</div>

<div id="ui">Punkty: <span id="score">0</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// scena
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,15,12);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const gridSize = 20;
scene.add(new THREE.GridHelper(gridSize, gridSize));

// zmienne
let snake = [];
let direction = new THREE.Vector3(1,0,0);
let nextDirection = new THREE.Vector3(1,0,0);
let gameRunning = false;
let score = 0;

const box = new THREE.BoxGeometry(1,1,1);
const headMat = new THREE.MeshBasicMaterial({color:0x00ff00});
const bodyMat = new THREE.MeshBasicMaterial({color:0x00cc00});
const foodMat = new THREE.MeshBasicMaterial({color:0xff0000});

//     WĄŻ
const head = new THREE.Mesh(box, headMat);
head.position.set(0,0.5,0);
scene.add(head);
snake.push(head);

// JEDZENIE
const food = new THREE.Mesh(box, foodMat);
scene.add(food);

function spawnFood() {
    let ok = false;

    while (!ok) {
        const x = Math.floor(Math.random()*gridSize)-gridSize/2;
        const z = Math.floor(Math.random()*gridSize)-gridSize/2;

        const pos = new THREE.Vector3(x,0.5,z);
        ok = true;

        for (let part of snake) {
            if (part.position.distanceTo(pos) < 0.1) {
                ok = false;
                break;
            }
        }

        if (ok) food.position.copy(pos);
    }
}

spawnFood();

// przyciski

addEventListener('keydown', e => {
    const k = e.key.toLowerCase();

    if ((k==='w'||k==='arrowup') && direction.z!==1)
        nextDirection.set(0,0,-1);

    else if ((k==='s'||k==='arrowdown') && direction.z!==-1)
        nextDirection.set(0,0,1);

    else if ((k==='a'||k==='arrowleft') && direction.x!==1)
        nextDirection.set(-1,0,0);

    else if ((k==='d'||k==='arrowright') && direction.x!==-1)
        nextDirection.set(1,0,0);
});


document.getElementById("startScreen").onclick = function() {
    this.style.display = "none";
    gameRunning = true;
    animate(0);
};


let lastTime = 0;
const speed = 150;

function animate(time) {
    if (!gameRunning) return;
    requestAnimationFrame(animate);

    if (time - lastTime > speed) {

        direction.copy(nextDirection);

        
        const lastTail = snake[snake.length-1].position.clone();

        
        for (let i=snake.length-1;i>0;i--) {
            snake[i].position.copy(snake[i-1].position);
        }

        
        head.position.add(direction);

        
        if (head.position.distanceTo(food.position) < 0.1) {

            score += 100;
            document.getElementById("score").innerText = score;

            
            const part = new THREE.Mesh(box, bodyMat);
            part.position.copy(lastTail);
            scene.add(part);
            snake.push(part);

            spawnFood();
        }

        
        for (let i=1;i<snake.length;i++) {
            if (head.position.distanceTo(snake[i].position) < 0.1) {
                endGame();
            }
        }

        
        const limit = gridSize/2;
        if (head.position.x > limit || head.position.x < -limit ||
            head.position.z > limit || head.position.z < -limit) {
            endGame();
        }

        lastTime = time;
    }

    renderer.render(scene, camera);
}

function endGame() {
    gameRunning = false;
    alert("Koniec gry! Wynik: " + score);
    location.reload();
}


addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
