<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numble</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">

        <!-- KEYBOARD -->
        <div id="keyboard">
            <div class="sideTitle">KEYBOARD</div>

            <div class="keyRow">
                <button class="key" id="0" disabled>0</button>
                <button class="key" id="1" disabled>1</button>
                <button class="key" id="2" disabled>2</button>
                <button class="key" id="3" disabled>3</button>
                <button class="key" id="4" disabled>4</button>
                <button class="key" id="5" disabled>5</button>
                <button class="key" id="6" disabled>6</button>
                <button class="key" id="7" disabled>7</button>
                <button class="key" id="8" disabled>8</button>
                <button class="key" id="9" disabled>9</button>
            </div>

            <div class="keyLegend">
                <div class="legendItem"><span class="legendDot" style="background:#90EE90;"></span> <span>Correct position</span></div>
                <div class="legendItem"><span class="legendDot" style="background:#FFFF00;"></span> <span>Wrong position</span></div>
                <div class="legendItem"><span class="legendDot" style="background:#D3D3D3;"></span> <span>Not in number</span></div>
            </div>
        </div>

        <!-- GAME -->
        <div id="game">
            <div id="difficultybox">
                <button id="difficultyBtn" class="language">NORMAL</button>
                <button id="easy" class="language hidden">EASY</button>
                <button id="normal" class="language hidden">NORMAL</button>
                <button id="hard" class="language hidden">HARD</button>
                <button id="insane" class="language hidden">INSANE</button>
            </div>

            <div class="box">
                <span id="title">Numble</span>

                <div id="guessbox">
                    <span id="info">Guess The Number</span>
                    <div id="attemptsLeft"></div>

                    <div id="inputContainer">
                        <input type="text" class="colorInput r" maxlength="1" pattern="[0-9]">
                        <input type="text" class="colorInput r" maxlength="1" pattern="[0-9]">
                        <input type="text" class="colorInput g" maxlength="1" pattern="[0-9]">
                        <input type="text" class="colorInput g" maxlength="1" pattern="[0-9]">
                        <input type="text" class="colorInput b" maxlength="1" pattern="[0-9]">
                        <input type="text" class="colorInput b" maxlength="1" pattern="[0-9]">
                    </div>

                    <input type="button" value="Guess" id="submit">
                    <input type="button" value="Play Again" id="NewGame" style="display:none;">
                </div>
            </div>
        </div>

        <!-- GUESS HISTORY -->
        <div id="guessed">
            <div class="sideTitle">GUESSES</div>
            <div id="guessHistory"></div>
        </div>

    </div>

<script>
const MAX_ATTEMPTS = 10;
let MAX_ATTEMPTS_CURRENT = 6;

let targetNumber = '';
let attempts = 0;
let showInputColors = false;

const inputs = document.querySelectorAll('.colorInput');

function generateRandomNumber() {
    let num = '';
    for (let i = 0; i < 6; i++) {
        num += Math.floor(Math.random() * 10);
    }
    return num;
}

function updateAttemptsDisplay() {
    const dots = document.getElementById('attemptsLeft');
    dots.innerHTML = '';
    for (let i = 0; i < MAX_ATTEMPTS_CURRENT; i++) {
        const dot = document.createElement('span');
        dot.className = 'attemptDot' + (i < attempts ? ' attemptDotUsed' : '');
        dots.appendChild(dot);
    }
}

function resetKeyboard() {
    for (let i = 0; i <= 9; i++) {
        const el = document.getElementById(i.toString());
        if (el) {
            el.style.backgroundColor = '';
            el.style.color = '#f9ebf9';
        }
    }
}

function updateKeyboard(user, target) {
    for (let i = 0; i < 6; i++) {
        const char = user[i];
        const el = document.getElementById(char);
        if (!el) continue;

        const currentBg = el.style.backgroundColor;

        if (char === target[i]) {
            el.style.backgroundColor = '#90EE90';
            el.style.color = '#0f0a0f';
        } else if (target.includes(char)) {
            if (currentBg !== '#90ee90') {
                el.style.backgroundColor = '#FFFF00';
                el.style.color = '#0f0a0f';
            }
        } else {
            if (currentBg !== '#90ee90' && currentBg !== '#ffff00') {
                el.style.backgroundColor = '#D3D3D3';
                el.style.color = '#0f0a0f';
            }
        }
    }
}

function startGame() {
    targetNumber = generateRandomNumber();
    attempts = 0;
    showInputColors = false;

    document.getElementById('box1').style.backgroundColor = 'transparent';

    document.getElementById('info').textContent = 'Guess The Number';

    inputs.forEach(input => {
        input.value = '';
        input.style.backgroundColor = '';
        input.style.color = '#f9ebf9';
        input.disabled = false;
    });

    document.getElementById('submit').style.display = 'block';
    document.getElementById('NewGame').style.display = 'none';
    document.getElementById('guessHistory').innerHTML = '';

    resetKeyboard();
    updateAttemptsDisplay();
    inputs[0].focus();
}

function updateInputColors() {
    if (!showInputColors) return;

    inputs.forEach((input, index) => {
        const char = input.value;

        if (!char) {
            input.style.backgroundColor = '';
        } else if (char === targetNumber[index]) {
            input.style.backgroundColor = '#90EE90';
        } else if (targetNumber.includes(char)) {
            input.style.backgroundColor = '#FFFF00';
        } else {
            input.style.backgroundColor = '#D3D3D3';
        }
    });
}

inputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;

        if (val && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateInputColors();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            inputs[index - 1].focus();
        } else if (e.key === 'Enter') {
            document.getElementById('submit').click();
        }
    });
});

function addGuessToHistory(user, target) {
    const history = document.getElementById('guessHistory');
    const entry = document.createElement('div');

    for (let i = 0; i < 6; i++) {
        const span = document.createElement('span');
        span.className = 'historyChar';
        span.textContent = user[i];

        if (user[i] === target[i]) {
            span.style.backgroundColor = '#90EE90';
        } else if (target.includes(user[i])) {
            span.style.backgroundColor = '#FFFF00';
        } else {
            span.style.backgroundColor = '#444';
            span.style.color = '#aaa';
        }

        entry.appendChild(span);
    }

    history.prepend(entry);
}

function endGame(won) {
    document.getElementById('submit').style.display = 'none';
    document.getElementById('NewGame').style.display = 'block';
    inputs.forEach(input => input.disabled = true);

    if (!won) {
        document.getElementById('info').textContent = `The number was ${targetNumber}`;
    }
}

document.getElementById('submit').addEventListener('click', function () {
    let userGuess = Array.from(inputs).map(i => i.value).join('');

    if (userGuess.length < 6) {
        document.getElementById('info').textContent = 'Fill all fields!';
        return;
    }

    showInputColors = true;
    updateInputColors();

    attempts++;
    updateAttemptsDisplay();

    updateKeyboard(userGuess, targetNumber);

    if (userGuess === targetNumber) {
        document.getElementById('info').textContent = `Correct in ${attempts}!`;
        addGuessToHistory(userGuess, targetNumber);
        endGame(true);
    } else if (attempts >= MAX_ATTEMPTS_CURRENT) {
        addGuessToHistory(userGuess, targetNumber);
        endGame(false);
    } else {
        document.getElementById('info').textContent = `${MAX_ATTEMPTS_CURRENT - attempts} attempts left`;
        addGuessToHistory(userGuess, targetNumber);

        inputs.forEach(input => {
            input.value = '';
            input.style.backgroundColor = '';
        });

        showInputColors = false;
        inputs[0].focus();
    }
});

document.getElementById('NewGame').addEventListener('click', startGame);

startGame();
</script>

</body>
</html>
