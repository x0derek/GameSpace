<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click</title>

<style>
#licznik {
    font-size: 48px;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

#licznik.animuj {
    transform: scale(1.5);
    opacity: 0.3;
}

.main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 50vh;
}

.przycisk {
    padding: 10px 20px;
    font-size: 24px;
    cursor: pointer;
}

#fireworks{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>

</head>
<body>

<div class="main">
<h1>Click Click Click</h1>
<p id="licznik">0</p>
<button class="przycisk" id="clickid">Kliknij!</button>
</div>

<canvas id="fireworks"></canvas>

<script>

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fireworks() {

    for(let i=0;i<120;i++){
        particles.push({
            x: canvas.width/2,
            y: canvas.height/2,
            angle: Math.random()*Math.PI*2,
            speed: Math.random()*6+2,
            life: 100
        });
    }

}

function updateFireworks(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{

        p.x += Math.cos(p.angle)*p.speed;
        p.y += Math.sin(p.angle)*p.speed;

        p.life--;

        ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
        ctx.fillRect(p.x,p.y,4,4);

        if(p.life<=0){
            particles.splice(i,1);
        }

    });

    requestAnimationFrame(updateFireworks);

}

updateFireworks();


function add(){

    const element = document.getElementById("licznik");
    const aktualna = Number(element.innerText);

    element.classList.add("animuj");

    let czas = 44;

    if (aktualna >= 950) {
        czas = 150;
    } else if (aktualna >= 990) {
        czas = 400;
    }

    setTimeout(function(){

        element.classList.remove("animuj");

        if (aktualna === 10) {

            element.innerText = 0;
            fireworks(); // 🎆 tutaj wybuch

        } else {

            element.innerText = aktualna + 1;

        }

    }, czas);

}

const click = document.getElementById("clickid");

click.addEventListener("click", function(){
    add();
});

</script>

</body>
</html>
