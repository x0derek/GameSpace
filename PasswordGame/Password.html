<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Password Game</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <h1>Password Game</h1>
    <p>Twoje hasło musi spełniać warunki. Ulepszaj poprzednie hasło, nie zaczynaj od nowa!</p>
    <ul id="conditionsList">
        <li data-condition="length">Co najmniej 6 znaków</li>
    </ul>

    <input type="text" id="passwordInput" value="" autocomplete="off">
    <button onclick="checkPassword()">Sprawdź</button>

    <p id="result"></p>

    <script>
        addEventListener("keydown", function(event) {
            if(event.key === "Enter") {
                checkPassword();
            }
        });

        const allConditions = [
            { key: 'length', text: 'Co najmniej 8 znaków', check: pw => pw.length >= 8 },
            { key: 'number', text: 'Zawiera przynajmniej jedną cyfrę', check: pw => /\d/.test(pw) },
            { key: 'uppercase', text: 'Zawiera wielką literę', check: pw => /[A-Z]/.test(pw) },
            { key: 'special', text: 'Zawiera znak specjalny (!@#$...)', check: pw => /[!@#$%^&*(),.?":{}|<>]/.test(pw) },
            { key: 'roman', text: 'Zawiera cyfrę rzymską (I, V, X, L, C)', check: pw => /[IVXLC]/.test(pw) },
            { key: 'month', text: 'Zawiera nazwę miesiąca po angielsku', check: pw => /(january|february|march|april|may|june|july|august|september|october|november|december)/i.test(pw) },
            { key: 'emoji', text: 'Zawiera emoji 😎', check: pw => /\p{Emoji}/u.test(pw) },
            { key: 'sum10', text: 'Suma wszystkich cyfr musi wynosić 10', check: pw => {
                const nums = pw.match(/\d/g);
                if(!nums) return false;
                return nums.map(n => +n).reduce((a,b)=>a+b,0) === 10;
            }},
            { key: 'palindrome', text: 'Zawiera palindrom (3+ znaków)', check: pw => /([a-zA-Z0-9])([a-zA-Z0-9])?\1/.test(pw) },
            { key: 'no_repeat', text: 'Nie może zawierać dwóch takich samych znaków obok siebie', check: pw => !/(.)\1/.test(pw) },
            { key: 'odd_length', text: 'Długość hasła musi być liczbą nieparzystą', check: pw => pw.length % 2 === 1 }
        ];

        let activeConditions = [allConditions[0]];
        let currentPassword = "";

        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const result = document.getElementById("result");

            let allMet = true;

            // Check all active conditions
            activeConditions.forEach(cond => {
                const li = document.querySelector(`li[data-condition="${cond.key}"]`);
                if (!cond.check(input)) {
                    allMet = false;
                    li.style.color = "red";
                    li.style.textDecoration = "line-through";
                } else {
                    li.style.color = "lime";
                    li.style.textDecoration = "none";
                }
            });

            if (allMet) {
                currentPassword = input;
                result.textContent = "✅ Hasło spełnia warunki!";
                result.style.color = "lime";

                addNextCondition();

                // Recheck to reflect new rule immediately
                if (activeConditions.length <= allConditions.length) {
                    checkPassword();
                }
            } else {
                result.textContent = "❌ Błąd! Hasło nie spełnia zasad!";
                result.style.color = "red";
            }

            document.getElementById("passwordInput").value = currentPassword;
            document.getElementById("passwordInput").focus();
        }

        function addNextCondition() {
            if (activeConditions.length < allConditions.length) {
                const next = allConditions[activeConditions.length];
                activeConditions.push(next);

                const li = document.createElement("li");
                li.textContent = next.text;
                li.setAttribute("data-condition", next.key);
                li.style.color = "red"; // show unmet initially
                li.style.textDecoration = "line-through";
                document.getElementById("conditionsList").appendChild(li);
            } else {
                document.getElementById("result").textContent = "🎉 WYGRAŁEŚ GRĘ HASŁA!";
                document.getElementById("result").style.color = "gold";
            }
        }
    </script>
</body>
</html>
